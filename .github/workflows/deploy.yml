name: CI

# Validates every push to main. Deployment is handled automatically by
# Vercel's GitHub integration — no secrets or manual steps required.

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Check required files
        run: |
          test -f public/llms.txt && echo "✅ llms.txt" || (echo "❌ llms.txt missing" && exit 1)
          test -f public/posts/index.json && echo "✅ posts/index.json" || (echo "❌ posts/index.json missing" && exit 1)

      - name: Validate posts index.json
        run: |
          python3 -c "
          import json, sys
          with open('public/posts/index.json') as f:
              posts = json.load(f)
          for p in posts:
              for field in ['slug', 'title', 'date', 'excerpt', 'category', 'readTime']:
                  if field not in p:
                      print(f'❌ Post {p.get(\"slug\", \"?\")} missing: {field}')
                      sys.exit(1)
          print(f'✅ {len(posts)} posts valid')
          "
